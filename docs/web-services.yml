openapi: 3.0.3
info:
  title: Stamp Webservices API
  description: REST API for managing stamp collections, including countries, albums, stamps, catalogues, sellers, and preferences
  version: 4.1.1
servers:
  - url: http://localhost:9001/stamp-webservices
    description: Local development server

security:
  - basicAuth: [ ]

paths:
  # COUNTRIES ENDPOINTS
  /rest/countries:
    get:
      summary: Get all countries
      description: Retrieve a list of countries with optional OData filtering, pagination, and sorting
      operationId: getCountries
      tags:
        - Countries
      parameters:
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/TopParam'
        - $ref: '#/components/parameters/SkipParam'
        - $ref: '#/components/parameters/OrderByParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  countries:
                    type: array
                    items:
                      $ref: '#/components/schemas/Country'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new country
      operationId: createCountry
      tags:
        - Countries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "Canada"
                description:
                  type: string
                  example: "North American country"
      responses:
        '201':
          description: Country created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Country'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/countries/{id}:
    get:
      summary: Get country by ID
      operationId: getCountryById
      tags:
        - Countries
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Country'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update country
      operationId: updateCountry
      tags:
        - Countries
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: modifyImagePath
          in: query
          description: If true, updates associated stamp image paths when country name changes
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Country updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Country'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete country
      description: Delete a country (cascades to remove associated stamps and album relationships)
      operationId: deleteCountry
      tags:
        - Countries
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Country deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/countries/!count:
    get:
      summary: Count countries
      operationId: countCountries
      tags:
        - Countries
      parameters:
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/TopParam'
        - $ref: '#/components/parameters/SkipParam'
        - $ref: '#/components/parameters/OrderByParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
            text/plain:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/countries/!countStamps:
    get:
      summary: Count stamps by country
      operationId: countStampsByCountry
      tags:
        - Countries
      responses:
        '200':
          description: Map of country IDs to stamp counts
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
            text/plain:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ALBUMS ENDPOINTS
  /rest/albums:
    get:
      summary: Get all albums
      operationId: getAlbums
      tags:
        - Albums
      parameters:
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/TopParam'
        - $ref: '#/components/parameters/SkipParam'
        - $ref: '#/components/parameters/OrderByParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  albums:
                    type: array
                    items:
                      $ref: '#/components/schemas/Album'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new album
      operationId: createAlbum
      tags:
        - Albums
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - stampCollectionRef
              properties:
                name:
                  type: string
                  example: "Canada Collection"
                description:
                  type: string
                stampCollectionRef:
                  type: integer
                  format: int64
                  description: Reference to stamp collection
                countries:
                  type: array
                  items:
                    type: integer
                    format: int64
                  description: Array of country IDs
      responses:
        '201':
          description: Album created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Album'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/albums/{id}:
    get:
      summary: Get album by ID
      operationId: getAlbumById
      tags:
        - Albums
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Album'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update album
      operationId: updateAlbum
      tags:
        - Albums
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                stampCollectionRef:
                  type: integer
                  format: int64
                countries:
                  type: array
                  items:
                    type: integer
                    format: int64
      responses:
        '200':
          description: Album updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Album'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete album
      operationId: deleteAlbum
      tags:
        - Albums
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Album deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/albums/{id}/moveTo/{scId}:
    post:
      summary: Move album to another stamp collection
      operationId: moveAlbum
      tags:
        - Albums
      parameters:
        - name: id
          in: path
          required: true
          description: Album ID
          schema:
            type: integer
            format: int64
        - name: scId
          in: path
          required: true
          description: Target stamp collection ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Album moved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Album'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/albums/!count:
    get:
      summary: Count albums
      operationId: countAlbums
      tags:
        - Albums
      parameters:
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/TopParam'
        - $ref: '#/components/parameters/SkipParam'
        - $ref: '#/components/parameters/OrderByParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
            text/plain:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/albums/!countStamps:
    get:
      summary: Count stamps by album
      operationId: countStampsByAlbum
      tags:
        - Albums
      responses:
        '200':
          description: Map of album IDs to stamp counts
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
            text/plain:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/InternalServerError'

  # STAMP COLLECTIONS ENDPOINTS
  /rest/stampCollections:
    get:
      summary: Get all stamp collections
      operationId: getStampCollections
      tags:
        - Stamp Collections
      parameters:
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/TopParam'
        - $ref: '#/components/parameters/SkipParam'
        - $ref: '#/components/parameters/OrderByParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  stampCollections:
                    type: array
                    items:
                      $ref: '#/components/schemas/StampCollection'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new stamp collection
      operationId: createStampCollection
      tags:
        - Stamp Collections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "My Collection"
                description:
                  type: string
      responses:
        '201':
          description: Stamp collection created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StampCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/stampCollections/{id}:
    get:
      summary: Get stamp collection by ID
      operationId: getStampCollectionById
      tags:
        - Stamp Collections
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StampCollection'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update stamp collection
      operationId: updateStampCollection
      tags:
        - Stamp Collections
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Stamp collection updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StampCollection'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete stamp collection
      operationId: deleteStampCollection
      tags:
        - Stamp Collections
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Stamp collection deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/stampCollections/!count:
    get:
      summary: Count stamp collections
      operationId: countStampCollections
      tags:
        - Stamp Collections
      parameters:
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/TopParam'
        - $ref: '#/components/parameters/SkipParam'
        - $ref: '#/components/parameters/OrderByParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
            text/plain:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/stampCollections/!countStamps:
    get:
      summary: Count stamps by stamp collection
      operationId: countStampsByStampCollection
      tags:
        - Stamp Collections
      responses:
        '200':
          description: Map of stamp collection IDs to stamp counts
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
            text/plain:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/InternalServerError'

  # STAMPS ENDPOINTS
  /rest/stamps:
    get:
      summary: Get all stamps
      operationId: getStamps
      tags:
        - Stamps
      parameters:
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/TopParam'
        - $ref: '#/components/parameters/SkipParam'
        - $ref: '#/components/parameters/OrderByParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  stamps:
                    type: array
                    items:
                      $ref: '#/components/schemas/Stamp'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new stamp
      operationId: createStamp
      tags:
        - Stamps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rate
                - countryRef
              properties:
                rate:
                  type: string
                  description: Denomination/rate of the stamp
                  example: "5c"
                description:
                  type: string
                countryRef:
                  type: integer
                  format: int64
                  description: Reference to country
                wantList:
                  type: boolean
                catalogueNumbers:
                  type: array
                  items:
                    $ref: '#/components/schemas/CatalogueNumber'
                stampOwnerships:
                  type: array
                  items:
                    $ref: '#/components/schemas/Ownership'
      responses:
        '201':
          description: Stamp created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stamp'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/stamps/{id}:
    get:
      summary: Get stamp by ID
      operationId: getStampById
      tags:
        - Stamps
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stamp'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update stamp
      operationId: updateStamp
      tags:
        - Stamps
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rate:
                  type: string
                description:
                  type: string
                countryRef:
                  type: integer
                  format: int64
                wantList:
                  type: boolean
                catalogueNumbers:
                  type: array
                  items:
                    $ref: '#/components/schemas/CatalogueNumber'
                stampOwnerships:
                  type: array
                  items:
                    $ref: '#/components/schemas/Ownership'
      responses:
        '200':
          description: Stamp updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stamp'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete stamp
      operationId: deleteStamp
      tags:
        - Stamps
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Stamp deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/stamps/purchase:
    post:
      summary: Purchase stamps
      description: Record a purchase transaction for multiple stamps
      operationId: purchaseStamps
      tags:
        - Stamps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pricePaid
                - currencyCode
                - stamps
              properties:
                pricePaid:
                  type: number
                  format: float
                  description: Total price paid (must be greater than zero)
                  example: 25.50
                currencyCode:
                  type: string
                  description: Currency code (e.g., USD, CAD)
                  example: "USD"
                stamps:
                  type: array
                  description: Array of stamp IDs being purchased
                  items:
                    type: integer
                    format: int64
      responses:
        '200':
          description: Purchase recorded successfully
        '400':
          description: Bad request - invalid parameters
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/stamps/!count:
    get:
      summary: Count stamps
      operationId: countStamps
      tags:
        - Stamps
      parameters:
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/TopParam'
        - $ref: '#/components/parameters/SkipParam'
        - $ref: '#/components/parameters/OrderByParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
            text/plain:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/InternalServerError'

  # SELLERS ENDPOINTS
  /rest/sellers:
    get:
      summary: Get all sellers
      operationId: getSellers
      tags:
        - Sellers
      parameters:
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/TopParam'
        - $ref: '#/components/parameters/SkipParam'
        - $ref: '#/components/parameters/OrderByParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  sellers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Seller'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new seller
      operationId: createSeller
      tags:
        - Sellers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "eBay Seller 123"
                description:
                  type: string
      responses:
        '201':
          description: Seller created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Seller'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/sellers/{id}:
    get:
      summary: Get seller by ID
      operationId: getSellerById
      tags:
        - Sellers
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Seller'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update seller
      operationId: updateSeller
      tags:
        - Sellers
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Seller updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Seller'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete seller
      operationId: deleteSeller
      tags:
        - Sellers
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Seller deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/sellers/!count:
    get:
      summary: Count sellers
      operationId: countSellers
      tags:
        - Sellers
      parameters:
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/TopParam'
        - $ref: '#/components/parameters/SkipParam'
        - $ref: '#/components/parameters/OrderByParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
            text/plain:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/sellers/!countStamps:
    get:
      summary: Count stamps by seller
      operationId: countStampsBySeller
      tags:
        - Sellers
      responses:
        '200':
          description: Map of seller IDs to stamp counts
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
            text/plain:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/InternalServerError'

  # CATALOGUES ENDPOINTS
  /rest/catalogues:
    get:
      summary: Get all catalogues
      operationId: getCatalogues
      tags:
        - Catalogues
      parameters:
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/TopParam'
        - $ref: '#/components/parameters/SkipParam'
        - $ref: '#/components/parameters/OrderByParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  catalogues:
                    type: array
                    items:
                      $ref: '#/components/schemas/Catalogue'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new catalogue
      operationId: createCatalogue
      tags:
        - Catalogues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - issue
                - type
              properties:
                name:
                  type: string
                  example: "Scott Standard"
                description:
                  type: string
                issue:
                  type: integer
                  description: Issue/edition number
                  example: 2024
                type:
                  type: integer
                  description: Catalogue type
                  example: 1
                code:
                  type: string
                  description: Currency code
                  example: "USD"
      responses:
        '201':
          description: Catalogue created successfully
          content:

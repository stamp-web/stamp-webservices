components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: integer
        format: int64

    FilterParam:
      name: $filter
      in: query
      description: OData filter expression (e.g., "(name eq 'Canada')")
      schema:
        type: string

    TopParam:
      name: $top
      in: query
      description: Maximum number of results to return (default 1000)
      schema:
        type: integer
        default: 1000

    SkipParam:
      name: $skip
      in: query
      description: Number of results to skip (default 0)
      schema:
        type: integer
        default: 0

    OrderByParam:
      name: $orderby
      in: query
      description: Field to sort by
      schema:
        type: string

  schemas:
    Country:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          example: 2
        name:
          type: string
          example: "Canada"
        description:
          type: string
        createTimestamp:
          type: string
          format: date-time
        modifyTimestamp:
          type: string
          format: date-time

    Album:
      type: object
      required:
        - id
        - name
        - stampCollectionRef
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: "Canada Collection"
        description:
          type: string
        stampCollectionRef:
          type: integer
          format: int64
          description: Reference to stamp collection
        countries:
          type: array
          items:
            type: integer
            format: int64
          description: Array of country IDs
        createTimestamp:
          type: string
          format: date-time
        modifyTimestamp:
          type: string
          format: date-time

    StampCollection:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: "My Collection"
        description:
          type: string
        createTimestamp:
          type: string
          format: date-time
        modifyTimestamp:
          type: string
          format: date-time

    Stamp:
      type: object
      required:
        - id
        - rate
        - countryRef
      properties:
        id:
          type: integer
          format: int64
        rate:
          type: string
          description: Denomination/rate
          example: "5c"
        description:
          type: string
        countryRef:
          type: integer
          format: int64
          description: Reference to country
        wantList:
          type: boolean
        createTimestamp:
          type: string
          format: date-time
        modifyTimestamp:
          type: string
          format: date-time
        catalogueNumbers:
          type: array
          items:
            $ref: '#/components/schemas/CatalogueNumber'
        stampOwnerships:
          type: array
          items:
            $ref: '#/components/schemas/Ownership'

    CatalogueNumber:
      type: object
      properties:
        id:
          type: integer
          format: int64
        value:
          type: number
          format: float
          description: Catalogue value
        number:
          type: string
          description: Catalogue number
          example: "123"
        unknown:
          type: boolean
          description: Unknown value flag
        condition:
          type: integer
          description: Condition code
        nospace:
          type: boolean
          description: Not available flag
        active:
          type: boolean
        catalogueRef:
          type: integer
          format: int64
          description: Reference to catalogue
        createTimestamp:
          type: string
          format: date-time
        modifyTimestamp:
          type: string
          format: date-time

    Ownership:
      type: object
      properties:
        id:
          type: integer
          format: int64
        pricePaid:
          type: number
          format: float
        purchased:
          type: string
          format: date-time
        grade:
          type: integer
          description: Grade code
        condition:
          type: integer
          description: Condition code
        img:
          type: string
          description: Image path
        notes:
          type: string
        code:
          type: string
          description: Currency code
        albumRef:
          type: integer
          format: int64
          description: Reference to album
        defects:
          type: integer
          description: Defects bitmask
        deception:
          type: integer
          description: Deception bitmask
        sellerRef:
          type: integer
          format: int64
          description: Reference to seller
        cert:
          type: boolean
          description: Certified flag
        certImg:
          type: string
          description: Certificate image path
        createTimestamp:
          type: string
          format: date-time
        modifyTimestamp:
          type: string
          format: date-time

    Seller:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: "eBay Seller 123"
        description:
          type: string
        createTimestamp:
          type: string
          format: date-time
        modifyTimestamp:
          type: string
          format: date-time

    Catalogue:
      type: object
      required:
        - id
        - name
        - issue
        - type
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: "Scott Standard"
        description:
          type: string
        issue:
          type: integer
          description: Issue/edition number
          example: 2024
        type:
          type: integer
          description: Catalogue type
        code:
          type: string
          description: Currency code
          example: "USD"
        createTimestamp:
          type: string
          format: date-time
        modifyTimestamp:
          type: string
          format: date-time

    Preference:
      type: object
      required:
        - id
        - name
        - category
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: "theme"
        category:
          type: string
          example: "ui"
        value:
          type: string
          example: "dark"
        createTimestamp:
          type: string
          format: date-time
        modifyTimestamp:
          type: string
          format: date-time

  responses:
    NotFound:
      description: Resource not found

    BadRequest:
      description: Bad request - missing required field or invalid parameters

    Conflict:
      description: Conflict - resource with the same identifier already exists

    InternalServerError:
      description: Internal server error

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Authentication with username and password